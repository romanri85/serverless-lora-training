# Output path for training runs. Each training run makes a new directory in here.
output_dir = '/data/diffusion_pipe_training_runs/flux2_loras'

# Dataset config file.
dataset = 'examples/dataset.toml'
# Eval dataset for measuring loss on held-out data (smooth loss curve in TensorBoard).
eval_datasets = [
    {name = 'eval', config = 'examples/eval_dataset.toml'},
]

# training settings
epochs = 80
micro_batch_size_per_gpu = 1
pipeline_stages = 1
gradient_accumulation_steps = 4
gradient_clipping = 1.0
warmup_steps = 100

# eval settings
eval_every_n_epochs = 1
eval_before_first_step = true
eval_micro_batch_size_per_gpu = 1
eval_gradient_accumulation_steps = 1

# misc settings
save_every_n_epochs = 10
checkpoint_every_n_minutes = 120
activation_checkpointing = true
partition_method = 'parameters'
save_dtype = 'bfloat16'
caching_batch_size = 1
steps_per_print = 1
video_clip_mode = 'single_middle'

[model]
type = 'flux2'
diffusion_model = '/models/flux2/flux2_dev_fp8mixed.safetensors'
vae = '/models/flux2/flux2-vae.safetensors'
text_encoders = [
    {path = '/models/flux2/mistral_3_small_flux2_fp8.safetensors', type = 'flux2'}
]
dtype = 'bfloat16'
diffusion_model_dtype = 'float8'
timestep_sample_method = 'logit_normal'
shift = 3

[adapter]
type = 'lora'
rank = 32
dtype = 'bfloat16'

[optimizer]
type = 'adamw_optimi'
lr = 2e-4
betas = [0.9, 0.99]
weight_decay = 0.01
eps = 1e-8
